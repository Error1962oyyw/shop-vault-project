server:
  port: 9090

spring:
  application:
    name: shop-vault

  datasource:
    url: jdbc:mysql://localhost:3306/shop-vault
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_ACCOUNT}
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD:}

  cache:
    type: simple

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  mail:
    host: smtp.qq.com
    port: 465
    username: ${QQ_MAIL_ACCOUNT}
    password: ${QQ_MAIL_AUTHORIZATION}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          ssl:
            enable: true
          auth: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.TsukasaChan.ShopVault.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

shop-vault:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
    min-secret-length: ${JWT_MIN_SECRET_LENGTH:32}
  YOLO:
    url: http://localhost:5000/predict
  points:
    expire-days: 365
    points-to-cash-rate: 100
    min-use-points: 100
    max-use-percent: 50
  upload:
    path: ./uploads
    url-prefix: /uploads

logging:
  level:
    com.shopvault: debug
    org.springframework: info
